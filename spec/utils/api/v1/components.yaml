components:
  parameters:
    doctor_id:
      name: doctor_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        example: 1

    patient_id:
      name: patient_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        example: 1

  schemas:
    Doctor:
      type: object
      required: [id, first_name, last_name]
      properties:
        id:
          type: integer
          format: int64
          example: 1
          readOnly: true
        first_name:
          type: string
          example: "Иван"
        last_name:
          type: string
          example: "Иванов"
        middle_name:
          type: string
          example: "Иванович"

    Patient:
      type: object
      required: [id, first_name, last_name, birthday, gender]
      properties:
        id:
          type: integer
          format: int64
          example: 10
          readOnly: true
        first_name:
          type: string
          example: "Петр"
        last_name:
          type: string
          example: "Петров"
        middle_name:
          type: string
          example: "Петрович"
        birthday:
          type: string
          format: date
          example: "1990-01-01"
        gender:
          type: boolean
          description: "Пол пациента: true = мужской, false = женский"
          example: true
        height:
          type: integer
          example: 180
        weight:
          type: integer
          example: 75
        created_at:
          type: string
          format: date-time
          readOnly: true
          example: "2025-09-26T22:56:19Z"
        updated_at:
          type: string
          format: date-time
          readOnly: true
          example: "2025-09-26T22:56:19Z"
